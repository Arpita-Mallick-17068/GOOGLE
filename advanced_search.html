                color: grey;

            }

            {
                color: grey;

    <body>
        <br>
        <div >
        <img src="googly pic.jpeg" alt="google" width="200" style="padding-left: 80px">
        </div>
        <form action="https://www.google.com/advanced_search" method="GET">
            <br>
            <hr>
            <div id="think">
               Advanced Search 
            </div>
            <br>
            <div id="thought">
                Find pages with
            </div>
            <br>
            <div id="enter">
                <b>All of these words: </b><input type="text" name="q" style="width:400px; height:40px; border-radius: 5px;">
                <br><br>
                <b>This exact word or phrase: </b><input type="text" name="q" style="width:400px; height:40px; border-radius: 5px;">

                <b>None of these words: </b><input type="text" name="q" style="width:400px; height:40px; border-radius: 5px;">

                <b>Site or domain: </b><input type="text" name="q" style="width:400px; height:40px; border-radius: 5px;">
            </div>
            <br>
            <div id="thought">
                Then narrow your results by
            </div>
            <br>
            <div id="enter">
